<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEMAX — My Tickets</title>
<style id="sharedStyle"></style>
<style>
.tickets-wrap{max-width:900px;margin:0 auto;padding:3rem 4rem 6rem}
.page-heading{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:5px;margin-bottom:.4rem}
.page-sub{color:var(--muted);font-size:.85rem;margin-bottom:3rem}

.tickets-list{display:flex;flex-direction:column;gap:1.2rem}
.ticket-item{background:var(--card);border-radius:16px;overflow:hidden;border:1.5px solid var(--border);transition:border-color .2s}
.ticket-item:hover{border-color:rgba(232,201,109,.35)}
.ti-head{background:linear-gradient(135deg,#18181f,#222235);padding:1.4rem 1.8rem;display:flex;align-items:center;gap:1.2rem;cursor:pointer}
.ti-emoji{font-size:2.5rem;flex-shrink:0}
.ti-info{flex:1}
.ti-title{font-weight:600;font-size:1rem;margin-bottom:.25rem}
.ti-meta{font-size:.78rem;color:var(--muted);display:flex;gap:1rem;flex-wrap:wrap}
.ti-price{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);letter-spacing:2px;flex-shrink:0}
.ti-chevron{color:var(--muted);transition:transform .3s;flex-shrink:0}
.ti-chevron.open{transform:rotate(180deg)}
.ti-body{display:none;padding:1.4rem 1.8rem 1.8rem;border-top:1px solid var(--border)}
.ti-body.open{display:block;animation:fadeUp .25s ease}
.ti-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.2rem}
.ti-field .ti-lbl{font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.ti-field .ti-val{font-size:.88rem;font-weight:500}
.ti-id{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--accent)}
.cancel-btn{font-size:.75rem;letter-spacing:1px;color:var(--accent2);background:transparent;border:1.5px solid rgba(255,107,107,.3);border-radius:6px;padding:.4rem .9rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.cancel-btn:hover{background:rgba(255,107,107,.08);border-color:var(--accent2)}
.ti-status{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.ti-status.confirmed{background:rgba(76,175,135,.15);color:var(--green);border:1px solid rgba(76,175,135,.3)}
.ti-status.cancelled{background:rgba(255,107,107,.1);color:var(--accent2);border:1px solid rgba(255,107,107,.2)}

.empty-state{text-align:center;padding:6rem 2rem}
.empty-icon{font-size:5rem;opacity:.3;margin-bottom:1.5rem}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:4px;margin-bottom:.6rem}
.empty-sub{color:var(--muted);font-size:.88rem;margin-bottom:2rem}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--card);border-radius:12px;padding:1.3rem;border:1px solid var(--border);text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);letter-spacing:2px}
.stat-lbl{font-size:.72rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:.2rem}
</style>
</head>
<body>
<div id="navMount"></div>
<div class="tickets-wrap">
  <div class="page-heading">MY TICKETS</div>
  <div class="page-sub" id="pageSub">Your booking history</div>
  <div class="stats-row" id="statsRow"></div>
  <div id="ticketsList"></div>
</div>
<footer style="max-width:900px;margin:0 auto">
  <div class="footer-logo">CINEMAX</div>
  <div class="footer-links"><a href="index.html">Home</a><a href="movies.html">Movies</a></div>
  <div class="footer-copy">© 2026 Cinemax</div>
</footer>
<script src="shared.js"></script>
<script>
document.getElementById("sharedStyle").textContent = SHARED_CSS;
document.getElementById("navMount").innerHTML = renderNav("my-tickets.html");

let bookings = Store.getBookings();

function renderStats(){
  const confirmed = bookings.filter(b=>b.status!=="cancelled");
  const total = confirmed.reduce((s,b)=>s+b.total,0);
  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-num">${bookings.length}</div><div class="stat-lbl">Total Bookings</div></div>
    <div class="stat-card"><div class="stat-num">${confirmed.length}</div><div class="stat-lbl">Confirmed</div></div>
    <div class="stat-card"><div class="stat-num">₹${total.toLocaleString("en-IN")}</div><div class="stat-lbl">Total Spent</div></div>`;
}

function renderTickets(){
  const el = document.getElementById("ticketsList");
  if(!bookings.length){
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎟️</div>
      <div class="empty-title">No Tickets Yet</div>
      <div class="empty-sub">You haven't booked any movies. Browse our collection and book your first show!</div>
      <a href="movies.html" class="btn btn-gold">Browse Movies</a>
    </div>`;
    return;
  }
  document.getElementById("pageSub").textContent = bookings.length + " booking" + (bookings.length!==1?"s":"") + " found";
  el.innerHTML = `<div class="tickets-list">${bookings.map((b,i)=>`
    <div class="ticket-item" id="ti${i}">
      <div class="ti-head" onclick="toggleTicket(${i})">
        <div class="ti-emoji">${b.movieEmoji||"🎬"}</div>
        <div class="ti-info">
          <div class="ti-title">${b.movieTitle} <span class="ti-status ${b.status||'confirmed'}">${b.status||'confirmed'}</span></div>
          <div class="ti-meta">
            <span>📅 ${b.date}</span><span>⏰ ${b.time}</span>
            <span>💺 ${Array.isArray(b.seats)?b.seats.join(", "):b.seats}</span>
          </div>
        </div>
        <div class="ti-price">₹${b.total.toLocaleString("en-IN")}</div>
        <svg class="ti-chevron" id="chev${i}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="ti-body" id="tib${i}">
        <div class="ti-grid">
          <div class="ti-field"><div class="ti-lbl">Booking ID</div><div class="ti-val ti-id">${b.bookingId}</div></div>
          <div class="ti-field"><div class="ti-lbl">Movie</div><div class="ti-val">${b.movieTitle}</div></div>
          <div class="ti-field"><div class="ti-lbl">Genre</div><div class="ti-val">${b.genre||"—"}</div></div>
          <div class="ti-field"><div class="ti-lbl">Date</div><div class="ti-val">${b.date}</div></div>
          <div class="ti-field"><div class="ti-lbl">Showtime</div><div class="ti-val">${b.time}</div></div>
          <div class="ti-field"><div class="ti-lbl">Seats</div><div class="ti-val">${Array.isArray(b.seats)?b.seats.join(", "):b.seats}</div></div>
          <div class="ti-field"><div class="ti-lbl">Guest</div><div class="ti-val">${b.customer?.firstName} ${b.customer?.lastName}</div></div>
          <div class="ti-field"><div class="ti-lbl">Email</div><div class="ti-val">${b.customer?.email}</div></div>
          <div class="ti-field"><div class="ti-lbl">Total Paid</div><div class="ti-val" style="color:var(--accent);font-weight:700">₹${b.total.toLocaleString("en-IN")}</div></div>
        </div>
        ${b.status!=="cancelled"?`<button class="cancel-btn" onclick="cancelBooking(${i})">Cancel Booking</button>`:'<span style="font-size:.78rem;color:var(--muted)">This booking has been cancelled.</span>'}
      </div>
    </div>`).join("")}</div>`;
}

function toggleTicket(i){
  const body=document.getElementById("tib"+i);
  const chev=document.getElementById("chev"+i);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}

function cancelBooking(i){
  if(!confirm("Cancel this booking?")) return;
  bookings[i].status="cancelled";
  Store.set("cx_bookings",bookings);
  renderStats(); renderTickets();
}

renderStats(); renderTickets();
</script>
</body>
</html>
