<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MRNGX2THXK"></script>

  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-MRNGX2THXK');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEMAX — Movie Detail</title>
<style id="sharedStyle"></style>
<style>
.detail-hero{position:relative;padding:5rem 4rem 4rem;overflow:hidden}
.detail-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 80% 50%,rgba(232,201,109,.05),transparent 70%);pointer-events:none}
.detail-layout{display:flex;gap:3rem;align-items:flex-start;position:relative;z-index:1}
.detail-poster{width:260px;flex-shrink:0}
.detail-poster-card{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--card),var(--card2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:8rem;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.wish-btn{width:100%;margin-top:.8rem;justify-content:center}

.detail-info{flex:1}
.detail-breadcrumb{font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
.detail-breadcrumb a{color:var(--muted);transition:color .2s}
.detail-breadcrumb a:hover{color:var(--accent)}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:5px;line-height:1;margin-bottom:1rem}
.detail-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.d-badge{padding:.3rem .8rem;border-radius:4px;font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.d-badge-format{background:var(--accent2);color:#fff}
.d-badge-genre{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.detail-meta-grid{display:grid;grid-template-columns:repeat(4,auto);gap:.5rem 2rem;margin-bottom:1.8rem;width:fit-content}
.dmg-label{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.dmg-val{font-weight:600;font-size:.92rem;margin-top:.15rem}
.dmg-val.gold{color:var(--accent)}
.detail-desc{color:var(--muted);font-size:.92rem;line-height:1.7;max-width:560px;margin-bottom:2rem;font-family:'Lora',serif;font-style:italic}
.cast-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem}
.cast-chip{padding:.4rem .9rem;border-radius:20px;background:var(--card2);border:1px solid var(--border);font-size:.76rem;color:var(--muted)}
.detail-actions{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}

/* SHOWTIMES SECTION */
.showtimes-section{padding:3rem 4rem 5rem}
.st-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;margin-bottom:2rem}
.date-strip{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:2rem}
.date-pill{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:.8rem 1.2rem;cursor:pointer;transition:all .2s;text-align:center;min-width:72px;color:var(--text)}
.date-pill:hover{border-color:var(--muted)}
.date-pill.sel{border-color:var(--accent);background:rgba(232,201,109,.07)}
.dp-day{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.dp-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1}
.dp-mon{font-size:.68rem;color:var(--muted)}
.time-slots{display:flex;gap:.8rem;flex-wrap:wrap}
.time-slot{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:.7rem 1.3rem;cursor:pointer;transition:all .2s;color:var(--text)}
.time-slot:hover{border-color:var(--muted)}
.time-slot.sel{border-color:var(--accent);background:rgba(232,201,109,.07);color:var(--accent);font-weight:700}
.ts-time{font-size:.9rem}
.ts-label{font-size:.68rem;color:var(--muted);margin-top:2px}
.book-cta{margin-top:2rem}

/* REVIEWS */
.reviews-section{padding:3rem 4rem;background:var(--surface)}
.review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;margin-top:1.5rem}
.review-card{background:var(--card);border-radius:12px;padding:1.4rem;border:1px solid var(--border)}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.review-name{font-weight:600;font-size:.88rem}
.review-stars{color:var(--accent);font-size:.85rem}
.review-text{color:var(--muted);font-size:.82rem;line-height:1.6;font-family:'Lora',serif;font-style:italic}
</style>
</head>
<body>
<div id="navMount"></div>
<div id="pageContent"></div>
<script src="shared.js"></script>
<script>
document.getElementById("sharedStyle").textContent = SHARED_CSS;
document.getElementById("navMount").innerHTML = renderNav("movies.html");

const params = new URLSearchParams(location.search);
const movie  = MOVIES.find(m=>m.id===params.get("id")) || MOVIES[0];
const dates  = getNext7Days();

const REVIEWS = [
  {name:"Arjun K.",stars:5,text:"Absolutely breathtaking. The kind of cinema that reminds you why you fell in love with films in the first place."},
  {name:"Priya M.",stars:4,text:"Visually stunning and emotionally resonant. The cast delivers career-best performances."},
  {name:"Rahul S.",stars:5,text:"A masterpiece. Every frame is a painting. I watched it twice in the same week."},
];

let selDate = dates[0].iso;
let selTime = null;
const wishlist = Store.getWishlist();

function renderPage(){
  document.title = `CINEMAX — ${movie.title}`;
  document.getElementById("pageContent").innerHTML = `
  <div class="detail-hero">
    <div class="detail-bg"></div>
    <div class="detail-layout">
      <div class="detail-poster">
        <div class="detail-poster-card">${movie.emoji}</div>
        <button class="btn btn-outline wish-btn" id="wishBtn" onclick="toggleWish()">
          ${wishlist.includes(movie.id)?'♥ Wishlisted':'♡ Add to Wishlist'}
        </button>
      </div>
      <div class="detail-info">
        <div class="detail-breadcrumb">
          <a href="index.html">Home</a> / <a href="movies.html">Movies</a> / <span>${movie.title}</span>
        </div>
        <div class="detail-title">${movie.title}</div>
        <div class="detail-badges">
          ${movie.badge?`<span class="d-badge d-badge-format">${movie.badge}</span>`:''}
          ${movie.tags.map(t=>`<span class="d-badge d-badge-genre">${t}</span>`).join('')}
        </div>
        <div class="detail-meta-grid">
          <div><div class="dmg-label">Rating</div><div class="dmg-val gold">★ ${movie.rating}</div></div>
          <div><div class="dmg-label">Votes</div><div class="dmg-val">${movie.votes}</div></div>
          <div><div class="dmg-label">Duration</div><div class="dmg-val">${movie.duration}</div></div>
          <div><div class="dmg-label">Language</div><div class="dmg-val">${movie.language}</div></div>
          <div><div class="dmg-label">Director</div><div class="dmg-val">${movie.director}</div></div>
          <div><div class="dmg-label">Release</div><div class="dmg-val">${movie.release}</div></div>
          <div><div class="dmg-label">Standard</div><div class="dmg-val">₹${movie.stdPrice}</div></div>
          <div><div class="dmg-label">Premium</div><div class="dmg-val">₹${movie.premPrice}</div></div>
        </div>
        <div class="detail-desc">"${movie.desc}"</div>
        <div class="cast-row">${movie.cast.map(c=>`<span class="cast-chip">👤 ${c}</span>`).join('')}</div>
        <div class="detail-actions">
          <a href="booking.html?id=${movie.id}" class="btn btn-gold">Book Tickets Now</a>
          <button class="btn btn-outline" onclick="document.querySelector('.showtimes-section').scrollIntoView({behavior:'smooth'})">View Showtimes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SHOWTIMES -->
  <div class="showtimes-section">
    <div class="st-title">SHOWTIMES</div>
    <div class="date-strip">${dates.map(d=>`
      <div class="date-pill ${d.iso===selDate?'sel':''}" onclick="selectDate('${d.iso}')">
        <div class="dp-day">${d.day}</div>
        <div class="dp-num">${d.num}</div>
        <div class="dp-mon">${d.month}</div>
      </div>`).join('')}</div>
    <div class="time-slots">${SHOWTIMES.map(t=>`
      <div class="time-slot ${t===selTime?'sel':''}" onclick="selectTime('${t}')">
        <div class="ts-time">${t}</div>
        <div class="ts-label">${SHOWTIME_LABELS[t]}</div>
      </div>`).join('')}</div>
    <div class="book-cta">
      <button class="btn btn-gold" onclick="bookNow()">Proceed to Seat Selection →</button>
      <div class="alert-bar" id="dtAlert">Please select a date and time first.</div>
    </div>
  </div>

  <!-- REVIEWS -->
  <div class="reviews-section">
    <div class="section-header"><div class="section-title">AUDIENCE REVIEWS</div></div>
    <div class="review-grid">${REVIEWS.map(r=>`
      <div class="review-card">
        <div class="review-header"><span class="review-name">${r.name}</span><span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span></div>
        <div class="review-text">${r.text}</div>
      </div>`).join('')}</div>
  </div>

  <footer><div class="footer-logo">CINEMAX</div>
    <div class="footer-links"><a href="index.html">Home</a><a href="movies.html">Movies</a></div>
    <div class="footer-copy">© 2026 Cinemax</div></footer>`;
}

function selectDate(iso){ selDate=iso; renderPage(); }
function selectTime(t){ selTime=t; renderPage(); }
function bookNow(){
  if(!selTime){ document.getElementById("dtAlert").classList.add("show"); return; }
  location.href=`booking.html?id=${movie.id}&date=${selDate}&time=${encodeURIComponent(selTime)}`;
}
function toggleWish(){
  const added = Store.toggleWishlist(movie.id);
  document.getElementById("wishBtn").textContent = added ? '♥ Wishlisted' : '♡ Add to Wishlist';
}
renderPage();
</script>
</body>
</html>
